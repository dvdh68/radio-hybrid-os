name: Build Radio Hybrid OS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-iso:
    name: Build installable Debian Live ISO
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ISO build packages
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y live-build live-boot live-config debootstrap squashfs-tools xorriso isolinux syslinux-common syslinux-utils grub-pc-bin grub-efi-amd64-bin mtools dosfstools ca-certificates curl qemu-system-x86

      - name: Generate live-build project
        run: |
          set -euo pipefail
          mkdir -p auto scripts config/package-lists config/hooks/live config/binary_debian-installer
          mkdir -p config/bootloaders/grub-pc config/bootloaders/syslinux_common
          mkdir -p config/includes.chroot/etc/live/config.conf.d config/includes.chroot/etc/lightdm/lightdm.conf.d config/includes.chroot/etc/lightdm/lightdm-gtk-greeter.conf.d
          mkdir -p config/includes.chroot/etc/skel/Desktop config/includes.chroot/usr/local/bin config/includes.chroot/usr/share/applications
          mkdir -p config/includes.chroot/usr/share/icons/hicolor/scalable/apps config/includes.chroot/usr/share/radio-hybrid

          cat > auto/config <<'EOF'
          #!/bin/sh
          set -e
          lb config noauto \
            --mode debian \
            --system live \
            --architecture amd64 \
            --distribution trixie \
            --archive-areas "main contrib non-free-firmware non-free" \
            --parent-archive-areas "main contrib non-free-firmware non-free" \
            --binary-image iso-hybrid \
            --bootloaders "syslinux,grub-efi" \
            --debian-installer live \
            --debian-installer-distribution trixie \
            --debian-installer-gui true \
            --debian-installer-preseedfile config/binary_debian-installer/preseed.cfg \
            --linux-flavours amd64 \
            --firmware-binary true \
            --firmware-chroot true \
            --security true \
            --updates true \
            --apt-recommends true \
            --apt-indices false \
            --checksums sha256 \
            --memtest none \
            --win32-loader false \
            --source false \
            --image-name radio-hybrid-os \
            --iso-application "Radio Hybrid OS Live" \
            --iso-publisher "Radio Hybrid" \
            --iso-volume "RADIO_HYBRID" \
            --bootappend-live "boot=live components quiet splash hostname=radio-hybrid username=radio user-fullname=RadioHybrid locales=de_DE.UTF-8 timezone=Europe/Berlin keyboard-layouts=de" \
            --bootappend-install "locale=de_DE.UTF-8 keymap=de timezone=Europe/Berlin" \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/" \
            --mirror-chroot-security "http://security.debian.org/debian-security/" \
            --mirror-binary-security "http://security.debian.org/debian-security/" \
            --mirror-debian-installer "http://deb.debian.org/debian/" \
            "${@}"
          EOF

          cat > scripts/check-requirements.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          for cmd in lb debootstrap mksquashfs xorriso isohybrid mcopy mkfs.vfat qemu-system-x86_64; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "FEHLER: $cmd fehlt." >&2; exit 1; }
          done
          echo "OK: Build-Voraussetzungen vorhanden."
          EOF

          cat > clean.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          lb clean --purge || true
          rm -f build.log
          rm -rf dist
          EOF

          cat > build.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          ISO_OUTPUT="dist/radio-hybrid-os-amd64.iso"
          fail(){ echo "FEHLER: $*" >&2; exit 1; }

          validate_iso(){
            local iso="$1"
            local tmp
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' RETURN
            xorriso -indev "$iso" -find / -type f -print > "$tmp/files.txt" 2>/dev/null || fail "ISO konnte nicht gelesen werden."
            grep -Eiq '(/install[^/]*/|/debian-installer/|/d-i/|live-installer)' "$tmp/files.txt" || fail "Debian Installer fehlt in der ISO."
            xorriso -osirrox on -indev "$iso" -extract /isolinux "$tmp/isolinux" -extract /boot/grub "$tmp/grub" >/dev/null 2>&1 || true
            grep -Riq "Radio Hybrid OS live starten" "$tmp" || fail "Bootmenue-Eintrag fuer Live-Start fehlt."
            grep -Riq "Radio Hybrid OS installieren" "$tmp" || fail "Bootmenue-Eintrag fuer Installation fehlt."
          }

          ./scripts/check-requirements.sh
          lb config
          lb build 2>&1 | tee build.log
          mkdir -p dist
          iso_source="$(find . -maxdepth 1 -type f \( -name '*.hybrid.iso' -o -name '*.iso' \) | sort | head -n 1)"
          [ -n "$iso_source" ] || fail "Keine ISO erzeugt. Siehe build.log."
          validate_iso "$iso_source"
          cp -f "$iso_source" "$ISO_OUTPUT"
          sha256sum "$ISO_OUTPUT" > "${ISO_OUTPUT}.sha256"
          iso_size="$(stat -c%s "$ISO_OUTPUT")"
          [ "$iso_size" -gt 524288000 ] || fail "ISO ist kleiner als 500 MB: $iso_size Bytes."
          echo "Fertig: $ISO_OUTPUT"
          EOF

          cat > config/package-lists/radio-hybrid.list.chroot <<'EOF'
          live-boot
          live-config
          live-config-systemd
          live-tools
          sudo
          dbus
          systemd-timesyncd
          locales
          console-setup
          keyboard-configuration
          ca-certificates
          curl
          wget
          less
          nano
          vim-tiny
          file
          psmisc
          procps
          usbutils
          pciutils
          lsb-release
          xdg-utils
          desktop-file-utils
          polkitd
          pkexec
          lxpolkit
          xserver-xorg
          xserver-xorg-input-libinput
          xserver-xorg-video-all
          lightdm
          lightdm-gtk-greeter
          xfce4
          xfce4-terminal
          xfce4-power-manager
          xfce4-pulseaudio-plugin
          thunar
          thunar-volman
          gvfs
          gvfs-backends
          udisks2
          fonts-dejavu
          fonts-noto-core
          adwaita-icon-theme
          papirus-icon-theme
          firefox-esr
          network-manager
          network-manager-gnome
          wpasupplicant
          wireless-regdb
          rfkill
          bluetooth
          bluez
          blueman
          pipewire
          pipewire-audio
          pipewire-pulse
          wireplumber
          alsa-utils
          pavucontrol
          firmware-linux
          firmware-linux-free
          firmware-misc-nonfree
          firmware-iwlwifi
          firmware-realtek
          firmware-atheros
          firmware-brcm80211
          firmware-sof-signed
          intel-microcode
          amd64-microcode
          acpi
          acpid
          upower
          power-profiles-daemon
          debian-installer-launcher
          xterm
          efibootmgr
          os-prober
          plymouth
          plymouth-themes
          plymouth-label
          EOF

          cat > config/includes.chroot/etc/hostname <<'EOF'
          radio-hybrid
          EOF

          cat > config/includes.chroot/etc/hosts <<'EOF'
          127.0.0.1 localhost
          127.0.1.1 radio-hybrid
          ::1 localhost ip6-localhost ip6-loopback
          EOF

          cat > config/includes.chroot/etc/os-release <<'EOF'
          PRETTY_NAME="Radio Hybrid OS 1.0 (Debian 13 trixie Live)"
          NAME="Radio Hybrid OS"
          VERSION_ID="1.0"
          VERSION="1.0"
          VERSION_CODENAME=trixie
          ID=debian
          ID_LIKE=debian
          EOF

          cat > config/includes.chroot/etc/live/config.conf.d/10-radio-hybrid-user.conf <<'EOF'
          LIVE_USERNAME="radio"
          LIVE_USER_FULLNAME="Radio Hybrid"
          LIVE_HOSTNAME="radio-hybrid"
          LIVE_LOCALES="de_DE.UTF-8"
          LIVE_TIMEZONE="Europe/Berlin"
          LIVE_KEYBOARD_LAYOUTS="de"
          LIVE_USER_DEFAULT_GROUPS="audio cdrom dip floppy video plugdev netdev powerdev scanner bluetooth sudo"
          EOF

          cat > config/includes.chroot/etc/lightdm/lightdm.conf.d/50-radio-hybrid.conf <<'EOF'
          [Seat:*]
          greeter-session=lightdm-gtk-greeter
          user-session=xfce
          autologin-user=radio
          autologin-user-timeout=0
          EOF

          cat > config/includes.chroot/etc/lightdm/lightdm-gtk-greeter.conf.d/50-radio-hybrid.conf <<'EOF'
          [greeter]
          background=#111827
          theme-name=Adwaita
          icon-theme-name=Papirus
          font-name=Noto Sans 11
          EOF

          cat > config/includes.chroot/usr/local/bin/radio-hybrid <<'EOF'
          #!/bin/sh
          APP_URL="file:///usr/share/radio-hybrid/index.html"
          if command -v chromium >/dev/null 2>&1; then exec chromium --app="$APP_URL"; fi
          if command -v firefox-esr >/dev/null 2>&1; then exec firefox-esr --new-window "$APP_URL"; fi
          exec xdg-open "$APP_URL"
          EOF

          cat > config/includes.chroot/usr/share/radio-hybrid/index.html <<'EOF'
          <!doctype html><html lang="de"><head><meta charset="utf-8"><title>Radio Hybrid</title><style>body{font-family:sans-serif;background:#0f172a;color:#f8fafc;margin:40px}input,button{font:inherit;padding:10px;margin:4px}audio{width:100%;max-width:720px}</style></head><body><h1>Radio Hybrid</h1><p>Lokale Web-App fuer Radio-Streams.</p><input id="u" placeholder="Stream-URL" size="60"><button onclick="a.src=u.value;a.play()">Starten</button><p><audio id="a" controls></audio></p></body></html>
          EOF

          cat > config/includes.chroot/usr/share/applications/radio-hybrid.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Radio Hybrid
          Exec=/usr/local/bin/radio-hybrid
          Icon=radio-hybrid
          Terminal=false
          Categories=AudioVideo;Network;
          EOF
          cp config/includes.chroot/usr/share/applications/radio-hybrid.desktop config/includes.chroot/etc/skel/Desktop/radio-hybrid.desktop

          cat > config/includes.chroot/usr/share/applications/radio-hybrid-install.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Radio Hybrid OS installieren
          Exec=debian-installer-launcher
          Icon=debian-installer-launcher
          Terminal=false
          Categories=System;
          EOF
          cp config/includes.chroot/usr/share/applications/radio-hybrid-install.desktop config/includes.chroot/etc/skel/Desktop/radio-hybrid-install.desktop

          cat > config/includes.chroot/usr/share/icons/hicolor/scalable/apps/radio-hybrid.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><rect width="128" height="128" rx="24" fill="#111827"/><circle cx="64" cy="64" r="42" fill="#38bdf8"/><text x="64" y="75" text-anchor="middle" font-size="32" font-family="sans-serif" font-weight="700" fill="#06111f">RH</text></svg>
          EOF

          cat > config/binary_debian-installer/preseed.cfg <<'EOF'
          d-i debian-installer/locale string de_DE.UTF-8
          d-i keyboard-configuration/xkb-keymap select de
          d-i time/zone string Europe/Berlin
          d-i apt-setup/contrib boolean true
          d-i apt-setup/non-free boolean true
          d-i apt-setup/non-free-firmware boolean true
          EOF

          cat > config/bootloaders/grub-pc/grub.cfg <<'EOF'
          source /boot/grub/config.cfg

          menuentry 'Radio Hybrid OS live starten' --hotkey=l {
            linux @KERNEL_LIVE@ @APPEND_LIVE@
            initrd @INITRD_LIVE@
          }

          if @ENABLE_INSTALL_MENU@; then
            menuentry 'Radio Hybrid OS installieren' --hotkey=i {
              linux @KERNEL_GI@ vga=788 @APPEND_INSTALL@ --- quiet
              initrd @INITRD_GI@
            }
            submenu 'Erweiterte Installationsoptionen ...' --hotkey=a {
              source /boot/grub/theme.cfg
              source /boot/grub/install.cfg
            }
          fi

          submenu 'Utilities...' --hotkey=u {
            source /boot/grub/theme.cfg
            if @ENABLE_VERIFY_CHECKSUMS@; then
              menuentry 'Verify integrity of the boot medium' --hotkey=v {
                linux @KERNEL_LIVE@ @APPEND_VERIFY_CHECKSUMS@
                initrd @INITRD_LIVE@
              }
            fi
            if [ "${grub_platform}" = "efi" ]; then
              menuentry 'UEFI Firmware Settings' --hotkey=f {
                fwsetup
              }
            fi
          }
          EOF

          cat > config/bootloaders/syslinux_common/menu.cfg <<'EOF'
          menu hshift 0
          menu width 82
          menu title Radio Hybrid OS
          include stdmenu.cfg
          include live.cfg
          @OPTIONAL_INSTALLER_INCLUDE@
          menu begin utilities
            menu label Utilities
            menu title Utilities
            include stdmenu.cfg
            label mainmenu
              menu label Back..
              menu exit
            include utilities.cfg
          menu end
          menu clear
          EOF

          cat > config/bootloaders/syslinux_common/live.cfg.in <<'EOF'
          label live-@FLAVOUR@
            menu label Radio Hybrid OS live starten
            menu default
            linux @LINUX@
            initrd @INITRD@
            append @APPEND_LIVE@

          label live-@FLAVOUR@-failsafe
            menu label Radio Hybrid OS live starten (abgesicherter Modus)
            linux @LINUX@
            initrd @INITRD@
            append @APPEND_LIVE_FAILSAFE@
          EOF

          cat > config/bootloaders/syslinux_common/install_gui.cfg <<'EOF'
          label installstart
            menu label Radio Hybrid OS installieren
            linux @KERNEL_GI@
            initrd @INITRD_GI@
            append vga=788 @APPEND_INSTALL@ --- quiet

          menu begin install
            menu label Erweiterte Installationsoptionen
            menu title Erweiterte Installationsoptionen
            include stdmenu.cfg
            label mainmenu
              menu label Back..
              menu exit

            label installgui
              menu label Installieren
              linux @KERNEL_GI@
              initrd @INITRD_GI@
              append vga=788 @APPEND_INSTALL@ --- quiet

            label installtext
              menu label Text-Installer
              linux @KERNEL_DI@
              initrd @INITRD_DI@
              append vga=788 @APPEND_INSTALL@ --- quiet

            label rescuegui
              menu label Rettungsmodus
              linux @KERNEL_GI@
              initrd @INITRD_GI@
              append rescue/enable=true vga=788 @APPEND_INSTALL@ --- quiet
          menu end
          EOF

          cat > config/hooks/live/9000-branding.hook.chroot <<'EOF'
          #!/bin/sh
          set -e
          chmod 755 /usr/local/bin/radio-hybrid /etc/skel/Desktop/*.desktop
          chmod 644 /usr/share/applications/*.desktop
          EOF

          cat > config/hooks/live/9100-services.hook.chroot <<'EOF'
          #!/bin/sh
          set -e
          systemctl enable NetworkManager bluetooth lightdm || true
          systemctl --global enable pipewire.service pipewire-pulse.service wireplumber.service || true
          EOF

          chmod +x scripts/*.sh *.sh config/hooks/live/* config/includes.chroot/usr/local/bin/radio-hybrid

      - name: Check build requirements
        run: ./scripts/check-requirements.sh

      - name: Clean previous build output
        run: ./clean.sh

      - name: Build ISO
        run: ./build.sh

      - name: Verify ISO artifact
        run: |
          ISO="dist/radio-hybrid-os-amd64.iso"
          SHA="${ISO}.sha256"
          [ -f "$ISO" ] || { echo "::error::Die ISO wurde nicht erzeugt: $ISO"; exit 1; }
          ISO_SIZE="$(stat -c%s "$ISO")"
          [ "$ISO_SIZE" -gt 524288000 ] || { echo "::error::Die ISO ist kleiner als 500 MB ($ISO_SIZE Bytes)."; exit 1; }
          [ -f "$SHA" ] || { echo "::error::Die SHA256-Datei wurde nicht erzeugt: $SHA"; exit 1; }
          sha256sum -c "$SHA"
          ls -lh "$ISO" "$SHA"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: radio-hybrid-os-iso
          path: |
            dist/radio-hybrid-os-amd64.iso
            dist/radio-hybrid-os-amd64.iso.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
